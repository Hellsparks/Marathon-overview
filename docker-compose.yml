services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    image: ghcr.io/hellsparks/marathon-overview-backend:latest
    container_name: marathon-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/data/marathon.db
      UPLOADS_DIR: /app/uploads
      MARATHON_DEPLOY_MODE: docker
      MARATHON_CONTAINER_NAME: marathon-backend
      APP_VERSION: ${APP_VERSION:-dev}
      # OCTOPRINT_API_KEY: changeme
    volumes:
      - backend_data:/app/data
      - gcode_uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/repo                              # full repo root — enables git pull + docker build from container
    expose:
      - "3000"
    networks:
      - marathon_net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    image: ghcr.io/hellsparks/marathon-overview-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - marathon_net

volumes:
  backend_data:
    driver: local
  gcode_uploads:
    driver: local

networks:
  marathon_net:
    name: marathon_net
    driver: bridge
